name: Phishing Triage Playbook
version: 1.1

steps:
  step_1:
    instructions: Identify 1. datetime, 2. Email address of sender/receiver, 3 IP address of sender/receiver and 4. subject of email.
    routing: step_2

  step_2:
    instructions: Does phishing attempt contain a URL or attachment?
    routing: step_3

  step_3:
    instructions: Was any malicious process spawned on the victim's machine?
    routing: step_4

  step_4:
    instructions: Analyze the process tree for signs of malicious activity, such as privilege escalation, lateral movement, or data exfiltration.
    routing: step_5

  step_5:
    instructions: Based on the analysis, determine if further investigation is necessary and the containment steps
    routing: complete