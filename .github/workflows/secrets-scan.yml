name: Secrets Scan (Gitleaks)

# Scans every push and pull request for hardcoded secrets / credentials / API keys
# and FAILS the check if any are found — guarding the LLM keys and .env from ever
# being committed to this (deployable) repo. Config + allowlist: .gitleaks.toml.
#
# NON-BLOCKING for the app: Streamlit Community Cloud redeploys regardless of GitHub
# Actions status, and this runs AFTER the push — so a red check never breaks the
# live app; it's a visible tripwire, not a deploy gate.

on:
  push:
  pull_request:
  workflow_dispatch:      # lets you run it on demand from the Actions tab

permissions:
  contents: read          # least privilege — only needs to read the code

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan the whole git history, not just the latest commit

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # gitleaks-action is FREE for personal accounts and public repos.
          # Only a PRIVATE, ORG-owned repo needs a (free) license key — if that's
          # you, grab one at https://gitleaks.io and add it as a repo secret named
          # GITLEAKS_LICENSE, then uncomment the next line:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
