name: Code Scan (deps + SAST)

# Two ADVISORY scans on every push/PR:
#   1. pip-audit  — known CVEs in the declared Python dependencies
#   2. Semgrep    — static analysis (Python security rules)
#
# Both jobs use `continue-on-error: true`, so findings are SURFACED (visible on the
# job + in its log) but the overall run stays green — they never block a push or the
# Streamlit Cloud deploy. This is deliberate: some findings are accepted risk (e.g.
# protobuf==3.20.3 is pinned for ChromaDB compat, and app.py disables TLS-warning
# noise for the on-prem NetWitness cert). To turn either into a hard gate later,
# just delete its `continue-on-error: true` line.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: Dependency CVE scan (pip-audit)
    runs-on: ubuntu-latest
    continue-on-error: true      # advisory — surfaces CVEs without failing the run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # matches the app's runtime
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit requirements.txt (direct deps)
        # --no-deps audits the versions you declare (what you control) without
        # resolving/installing the whole heavy tree — fast and deterministic.
        # Drop --no-deps for transitive coverage (slower, can flake on native builds).
        run: pip-audit -r requirements.txt --no-deps --desc

  semgrep:
    name: Static analysis (Semgrep)
    runs-on: ubuntu-latest
    continue-on-error: true      # advisory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep
      - name: Run Semgrep (Python security ruleset)
        # p/python = curated community Python security rules (no login needed).
        # --error makes findings exit non-zero → visible on the job (kept non-fatal
        # to the run by continue-on-error above). --metrics off = no telemetry.
        run: semgrep scan --config p/python --metrics off --error
